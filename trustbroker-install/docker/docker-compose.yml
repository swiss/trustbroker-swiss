# vim: syntax=yaml textwidth=120 expandtab tabstop=2 softtabstop=2 shiftwidth=2 autoindent
# Docker compose setting up a standalone XTB service on a local docker host.configs:
# NOTE: Source the ENV defining the secret first or define them inline (SSH_KEY, PKI_PASSPHRASE, STATECACHE_PASS)

networks:
  trustbroker-network:
    external: false

services:
  postgresql:
    container_name: postgresql
    restart: on-failure
    image: docker.io/library/postgres:18
    volumes:
      - ./postgresql:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=tbss16
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=${STATECACHE_PASS}
    networks:
      - trustbroker-network

  mariadb:
    container_name: mariadb
    restart: on-failure
    image: docker.io/library/mariadb:12-ubi
    volumes:
      - ./mariadb:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=TBSS16
      - MYSQL_ROOT_PASSWORD=${STATECACHE_PASS}
      - MYSQL_PASSWORD=${STATECACHE_PASS}
      - MYSQL_USER=trustbroker
    networks:
      - trustbroker-network

  gitea:
    container_name: gitea
    restart: on-failure
    image: docker.io/gitea/gitea:1.21.5
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - ./gitea:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"
    networks:
      - trustbroker-network

  ldap:
    container_name: ldap
    image: osixia/openldap:stable
    ports:
      - '1389:1389'
      - '1636:1636'
    environment:
      - BITNAMI_DEBUG=true
      - LDAP_ROOT=dc=trustbroker,dc=swiss
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=secret
      - LDAP_CUSTOM_SCHEMA_DIR=/schema_init
      - LDAP_CUSTOM_LDIF_DIR=/ldif_init
    volumes:
      - ./ldap_init/schema:/schema_init:ro
      - ./ldap_init/ldif:/ldif_init:ro
      #- openldap_data:/bitnami/openldap

  # http://localhost:8099
  # loginDN: cn=admin,dc=trustbroker,dc=swiss  password: secret
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    environment:
      - PHPLDAPADMIN_HTTPS=false
      - PHPLDAPADMIN_LDAP_HOSTS=ldap://ldap:1389
    ports:
      - '8099:80'
    depends_on:
      - ldap

  trustbroker:
    container_name: trustbroker
    image: ghcr.io/trustbroker-swiss/trustbroker-application:latest
    user: "${UID}:${GID}"
    depends_on:
      - gitea
      - postgresql
      - ldap
    volumes:
      - ./ssh:/etc/trustbroker/keys:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      - GIT_URL=${GIT_URL}
      - GIT_TOKEN=${GIT_TOKEN}
      - SSH_KEY=${SSH_KEY}
      - CONFIG_BRANCH=main
      - SPRING_PROFILES_ACTIVE=DEMO
      - PKI_PASSPHRASE=${PKI_PASSPHRASE}
      - SPRING_FLYWAY_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_FLYWAY_LOCATIONS=classpath:db/migration/postgresql
      - SPRING_FLYWAY_SCHEMAS=tbss16
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgresql:5432/tbss16
      - SPRING_FLYWAY_USER=root
      - SPRING_FLYWAY_PASSWORD=${STATECACHE_PASS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgresql:5432/tbss16?currentSchema=tbss16
      - SPRING_DATASOURCE_USERNAME=trustbroker
      - SPRING_DATASOURCE_PASSWORD=${STATECACHE_PASS}
      #
      # martiadb support
      #- SPRING_FLYWAY_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
      #- SPRING_FLYWAY_LOCATIONS=classpath:db/migration/mariadb
      #- SPRING_FLYWAY_URL=jdbc:mariadb://mariadb:5432
      #- SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:5432/tbss16
      #
      # Debug SSH startup in case of connectivity problem with external git repo
      #- LOGGING_LEVEL_ROOT=DEBUG
      #
      # When running behind an enterprise proxy inject a HTTPS or SSH proxy (HTTP not supported)
      #- HTTPS_PROXY=http://proxy.company.com:1234
      #- SSH_PROXY_HOST=proxy.company.com
      #- SSH_PROXY_PORT=1234
      #
      # When running on HTTP relax cookie polices
      - TRUSTBROKER_CONFIG_SECUREBROWSERHEADERS=false
    networks:
      - trustbroker-network

  samlmock:
    container_name: samlmock
    image: ghcr.io/trustbroker-swiss/trustbroker-samlmock:latest
    depends_on:
      - gitea
    volumes:
      - ./ssh:/etc/trustbroker/keys:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "7070:7070"
      - "7071:7071"
    environment:
      - GIT_URL=${GIT_URL}
      - GIT_TOKEN=${GIT_TOKEN}
      - SSH_KEY=${SSH_KEY}
      - CONFIG_BRANCH=main
      - SPRING_PROFILES_ACTIVE=DEMO
      - PKI_PASSPHRASE=${PKI_PASSPHRASE}
    networks:
      - trustbroker-network
